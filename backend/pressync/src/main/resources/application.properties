spring.application.name=pressync

# === Database ===
spring.datasource.url=jdbc:mariadb://localhost:3306/pressync
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:vlad2005}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.max-lifetime=1800000

# Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway — baseline-on-migrate allows existing DBs to adopt Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Actuator — health endpoint only
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

logging.level.com.example.pressync.audit=INFO
debug=false

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=pressync.app@gmail.com
# Replace [placeholder] with a 16-character Google App Password (not your regular Gmail password).
spring.mail.password=${MAIL_PASSWORD:isax upvp dpre adck}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.from=pressync.app@gmail.com
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

