<div class="min-h-screen bg-background text-foreground flex">
  @if (isSidebarOpen()) {
    <div class="fixed inset-0 z-40 bg-black/60 backdrop-blur-sm md:hidden" (click)="toggleSidebar()"></div>
  }

  <aside
    class="hidden md:flex w-64 flex-col border-r border-border bg-sidebar text-sidebar-foreground"
  >
    <div class="h-16 flex items-center px-6 border-b border-sidebar-border">
      <div class="w-9 h-9 rounded-xl border border-sidebar-ring bg-sidebar-accent flex items-center justify-center">
        <svg
          class="w-5 h-5 text-sidebar-primary"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M4 4h16v16H4z" />
          <path d="M8 8h8v8H8z" />
        </svg>
      </div>
      <span class="ml-3 text-sm font-semibold">Pressync</span>
    </div>

    <nav class="flex-1 px-4 py-6 space-y-1">
      <a
        routerLink="/dashboard"
        routerLinkActive="bg-sidebar-accent text-sidebar-foreground"
        class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm text-sidebar-foreground/80 hover:bg-sidebar-accent/70 transition"
      >
        <svg
          class="w-4 h-4 text-sidebar-primary"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M3 12l9-9 9 9" />
          <path d="M9 21V9h6v12" />
        </svg>
        Dashboard
      </a>
      <a
        routerLink="/search"
        routerLinkActive="bg-sidebar-accent text-sidebar-foreground"
        class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm text-sidebar-foreground/80 hover:bg-sidebar-accent/70 transition"
      >
        <svg
          class="w-4 h-4 text-sidebar-primary"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="11" cy="11" r="8" />
          <path d="M21 21l-4.3-4.3" />
        </svg>
        Search
      </a>
    </nav>
  </aside>

  @if (isSidebarOpen()) {
    <aside
      class="fixed inset-y-0 left-0 z-50 w-64 flex flex-col border-r border-border bg-sidebar text-sidebar-foreground md:hidden"
    >
      <div class="h-16 flex items-center justify-between px-6 border-b border-sidebar-border">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-xl border border-sidebar-ring bg-sidebar-accent flex items-center justify-center">
            <svg
              class="w-5 h-5 text-sidebar-primary"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M4 4h16v16H4z" />
              <path d="M8 8h8v8H8z" />
            </svg>
          </div>
          <span class="text-sm font-semibold">Pressync</span>
        </div>
        <button
          type="button"
          class="inline-flex items-center justify-center rounded-lg border border-border bg-card px-2 py-1 text-xs text-foreground"
          (click)="toggleSidebar()"
        >
          <span class="sr-only">Close menu</span>
          <svg
            class="w-4 h-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M6 6l12 12" />
            <path d="M6 18L18 6" />
          </svg>
        </button>
      </div>

      <nav class="flex-1 px-4 py-6 space-y-1">
        <a
          routerLink="/dashboard"
          routerLinkActive="bg-sidebar-accent text-sidebar-foreground"
          class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm text-sidebar-foreground/80 hover:bg-sidebar-accent/70 transition"
          (click)="toggleSidebar()"
        >
          <svg
            class="w-4 h-4 text-sidebar-primary"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M3 12l9-9 9 9" />
            <path d="M9 21V9h6v12" />
          </svg>
          Dashboard
        </a>
        <a
          routerLink="/search"
          routerLinkActive="bg-sidebar-accent text-sidebar-foreground"
          class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm text-sidebar-foreground/80 hover:bg-sidebar-accent/70 transition"
          (click)="toggleSidebar()"
        >
          <svg
            class="w-4 h-4 text-sidebar-primary"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="M21 21l-4.3-4.3" />
          </svg>
          Search
        </a>
      </nav>
    </aside>
  }

  <div class="flex-1 min-w-0">
    <header class="bg-slate-900/60 backdrop-blur-2xl border-b border-slate-700/50 sticky top-0 z-10 shadow-2xl">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
        <div class="flex items-center justify-between gap-4 flex-wrap">
          <div class="flex items-center gap-4">
            <button
              type="button"
              class="md:hidden inline-flex items-center justify-center rounded-lg border border-border bg-card px-3 py-2 text-xs text-foreground"
              (click)="toggleSidebar()"
            >
              <span class="sr-only">Toggle menu</span>
              <svg
                class="w-4 h-4"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M4 6h16" />
                <path d="M4 12h16" />
                <path d="M4 18h16" />
              </svg>
            </button>
            <div class="w-10 h-10 bg-emerald-500/10 backdrop-blur-xl rounded-xl flex items-center justify-center border border-emerald-500/30">
              <svg
                class="w-5 h-5 text-emerald-400"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M4 4h16v16H4z" />
                <path d="M7 9h10" />
                <path d="M7 12h10" />
                <path d="M7 15h6" />
              </svg>
            </div>
            <div>
              <h1 class="text-lg font-bold text-white flex items-center gap-2">
                attendance.sys
                <svg
                  class="w-4 h-4 text-emerald-400"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M12 3v18" />
                  <path d="M5 12h14" />
                </svg>
              </h1>
              <p class="text-xs text-slate-500">
                <span class="text-emerald-500">$</span> user session active
              </p>
            </div>
          </div>

          <div class="flex items-center gap-2 flex-1 max-w-md">
            <div class="relative flex-1">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-emerald-500">$</span>
              <input
                type="text"
                class="w-full bg-slate-950/50 backdrop-blur-xl border border-slate-700/50 rounded-lg pl-8 pr-4 py-2 text-sm text-white placeholder:text-slate-600 focus:outline-none focus:border-emerald-500/50 focus:ring-2 focus:ring-emerald-500/20 transition-all"
                placeholder="search_records"
              />
            </div>
            <button
              type="button"
              class="flex items-center gap-2 px-4 py-2 text-sm text-emerald-400 bg-emerald-500/10 backdrop-blur-xl hover:bg-emerald-500/20 rounded-lg transition-all border border-emerald-500/30 shadow-lg shadow-emerald-500/10"
            >
              <svg
                class="w-4 h-4"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <circle cx="11" cy="11" r="8" />
                <path d="M21 21l-4.3-4.3" />
              </svg>
              search
            </button>
          </div>

          <button
            type="button"
            class="flex items-center gap-2 px-4 py-2 text-sm text-emerald-400 bg-slate-800/50 backdrop-blur-xl hover:bg-slate-800/80 rounded-lg transition-all border border-slate-700/50"
          >
            <svg
              class="w-4 h-4"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <path d="M16 17l5-5-5-5" />
              <path d="M21 12H9" />
            </svg>
            exit
          </button>
        </div>
      </div>
    </header>

    <main class="px-4 sm:px-6 lg:px-8 py-8">
      <router-outlet />
    </main>
  </div>
</div>
