<div class="min-h-screen flex">
  @if (isSidebarOpen()) {
    <div class="fixed inset-0 z-40 bg-black/60 backdrop-blur-sm md:hidden" (click)="toggleSidebar()"></div>
  }

  <aside
    class="sidebar-panel hidden md:flex w-64 flex-col border-r"
  >
    <div class="h-16 flex items-center px-6 border-b">
      <div class="sidebar-logo-box w-9 h-9 rounded-xl border flex items-center justify-center">
        <svg
          class="sidebar-logo-icon w-5 h-5"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M4 4h16v16H4z" />
          <path d="M8 8h8v8H8z" />
        </svg>
      </div>
      <span class="ml-3 text-sm font-semibold">Pressync</span>
    </div>

    <nav class="flex-1 px-4 py-6 space-y-1">
      <a
        routerLink="/dashboard"
        routerLinkActive="sidebar-link-active"
        class="sidebar-link flex items-center gap-3 rounded-lg px-3 py-2 text-sm transition"
      >
        <svg
          class="sidebar-logo-icon w-4 h-4"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M3 12l9-9 9 9" />
          <path d="M9 21V9h6v12" />
        </svg>
        Dashboard
      </a>
      <a
        routerLink="/search"
        routerLinkActive="sidebar-link-active"
        class="sidebar-link flex items-center gap-3 rounded-lg px-3 py-2 text-sm transition"
      >
        <svg
          class="sidebar-logo-icon w-4 h-4"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="11" cy="11" r="8" />
          <path d="M21 21l-4.3-4.3" />
        </svg>
        Search
      </a>
    </nav>
  </aside>

  @if (isSidebarOpen()) {
    <aside
      class="sidebar-panel fixed inset-y-0 left-0 z-50 w-64 flex flex-col border-r md:hidden"
    >
      <div class="h-16 flex items-center justify-between px-6 border-b">
        <div class="flex items-center gap-3">
          <div class="sidebar-logo-box w-9 h-9 rounded-xl border flex items-center justify-center">
            <svg
              class="sidebar-logo-icon w-5 h-5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M4 4h16v16H4z" />
              <path d="M8 8h8v8H8z" />
            </svg>
          </div>
          <span class="text-sm font-semibold">Pressync</span>
        </div>
        <button
          type="button"
          class="sidebar-mobile-close-btn inline-flex items-center justify-center rounded-lg border px-2 py-1 text-xs"
          (click)="toggleSidebar()"
        >
          <span class="sr-only">Close menu</span>
          <svg
            class="w-4 h-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M6 6l12 12" />
            <path d="M6 18L18 6" />
          </svg>
        </button>
      </div>

      <nav class="flex-1 px-4 py-6 space-y-1">
        <a
          routerLink="/dashboard"
          routerLinkActive="sidebar-link-active"
          class="sidebar-link flex items-center gap-3 rounded-lg px-3 py-2 text-sm transition"
          (click)="toggleSidebar()"
        >
          <svg
            class="sidebar-logo-icon w-4 h-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M3 12l9-9 9 9" />
            <path d="M9 21V9h6v12" />
          </svg>
          Dashboard
        </a>
        <a
          routerLink="/search"
          routerLinkActive="sidebar-link-active"
          class="sidebar-link flex items-center gap-3 rounded-lg px-3 py-2 text-sm transition"
          (click)="toggleSidebar()"
        >
          <svg
            class="sidebar-logo-icon w-4 h-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="M21 21l-4.3-4.3" />
          </svg>
          Search
        </a>
      </nav>
    </aside>
  }

  <div class="flex-1 min-w-0">
    <header class="header-bar backdrop-blur-2xl border-b sticky top-0 z-10 shadow-2xl">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
        <div class="flex items-center justify-between gap-4 flex-wrap">
          <div class="flex items-center gap-4">
            <button
              type="button"
              class="mobile-menu-btn md:hidden inline-flex items-center justify-center rounded-lg border px-3 py-2 text-xs"
              (click)="toggleSidebar()"
            >
              <span class="sr-only">Toggle menu</span>
              <svg
                class="w-4 h-4"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M4 6h16" />
                <path d="M4 12h16" />
                <path d="M4 18h16" />
              </svg>
            </button>
            <div class="accent-box w-10 h-10 backdrop-blur-xl rounded-xl flex items-center justify-center border">
              <svg
                class="accent-icon w-5 h-5"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M4 4h16v16H4z" />
                <path d="M7 9h10" />
                <path d="M7 12h10" />
                <path d="M7 15h6" />
              </svg>
            </div>
            <div>
              <h1 class="header-title text-lg font-bold flex items-center gap-2">
                attendance.sys
                <svg
                  class="accent-icon w-4 h-4"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M12 3v18" />
                  <path d="M5 12h14" />
                </svg>
              </h1>
              <p class="header-muted text-xs">
                <span class="accent-dollar">$</span> user session active
              </p>
            </div>
          </div>

          <div class="flex items-center gap-2 flex-1 max-w-md">
            <div class="relative flex-1">
              <span class="accent-dollar absolute left-4 top-1/2 -translate-y-1/2">$</span>
              <input
                type="text"
                class="header-input w-full backdrop-blur-xl border rounded-lg pl-8 pr-4 py-2 text-sm transition-all"
                placeholder="search_records"
              />
            </div>
            <button
              type="button"
              class="accent-search-btn flex items-center gap-2 px-4 py-2 text-sm backdrop-blur-xl rounded-lg transition-all border"
            >
              <svg
                class="w-4 h-4"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <circle cx="11" cy="11" r="8" />
                <path d="M21 21l-4.3-4.3" />
              </svg>
              search
            </button>
          </div>

          <button
            type="button"
            class="header-exit-btn flex items-center gap-2 px-4 py-2 text-sm backdrop-blur-xl rounded-lg transition-all border"
          >
            <svg
              class="w-4 h-4"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <path d="M16 17l5-5-5-5" />
              <path d="M21 12H9" />
            </svg>
            exit
          </button>
        </div>
      </div>
    </header>

    <main class="px-4 sm:px-6 lg:px-8 py-8">
      <router-outlet />
    </main>
  </div>
</div>
