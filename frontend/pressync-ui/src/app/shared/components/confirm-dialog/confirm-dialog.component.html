@if (isOpen) {
  <div class="modal-backdrop" role="dialog" aria-modal="true" aria-label="Confirmation dialog">
    <div class="confirm-dialog">
      <div class="confirm-header">
        <h3>{{ title }}</h3>
        <button class="modal-close-btn" type="button" (click)="close()">✕</button>
      </div>
      <div class="confirm-body">
        <p>{{ message }}</p>
      </div>
      <div class="confirm-actions">
        <button type="button" class="btn-ghost" (click)="close()">{{ cancelLabel }}</button>
        <button type="button" class="btn-solid" [class.danger]="destructive" (click)="confirm()">{{ confirmLabel }}</button>
      </div>
    </div>
  </div>
}
