<div class="toast-stack" aria-live="polite">
  @for (toast of toasts(); track toast.id) {
    <div class="toast-item" [class.success]="toast.type === 'success'" [class.error]="toast.type === 'error'" [class.info]="toast.type === 'info'">
      <div class="toast-content">
        <div class="toast-title">{{ toast.title }}</div>
        @if (toast.message) {
          <div class="toast-message">{{ toast.message }}</div>
        }
      </div>
      <button type="button" class="toast-close" (click)="dismiss(toast.id)" aria-label="Dismiss notification">
        ✕
      </button>
    </div>
  }
</div>
