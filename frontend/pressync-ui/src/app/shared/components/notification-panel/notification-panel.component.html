@if (isOpen) {
  <div class="panel-backdrop" (click)="onBackdropClick()"></div>

  <div class="panel-container" (click)="onPanelClick($event)">
    <div class="panel-header">
      <h3 class="panel-title">Notifications</h3>
      @if (notificationService.unreadCount() > 0) {
        <button type="button" class="mark-all-btn" (click)="onMarkAllRead()">
          Mark all as read
        </button>
      }
    </div>

    <div class="panel-body">
      @if (notificationService.notifications().length === 0) {
        <div class="panel-empty">
          <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
          </svg>
          <p class="empty-text">No notifications yet</p>
        </div>
      } @else {
        <div class="panel-list">
          @for (notification of notificationService.notifications(); track notification.id) {
            <app-notification-card
              [notification]="notification"
              [compact]="true"
              (markRead)="onMarkRead($event)"
              (dismiss)="onDismiss($event)"
            />
          }
        </div>
      }
    </div>

    <div class="panel-footer">
      <a routerLink="/notifications" class="view-all-link" (click)="closePanel.emit()">
        View all notifications
      </a>
    </div>
  </div>
}
