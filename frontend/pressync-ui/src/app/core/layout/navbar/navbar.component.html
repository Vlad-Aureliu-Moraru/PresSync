@if (!isAuthPage()) {
  <nav class="global-navbar">
    <div class="nav-container">
      <div class="nav-left">
        <a [routerLink]="dashboardLink()" class="brand-link">Pressync</a>
      </div>

      @if (authService.isAdminOrModerator()) {
        <div class="nav-center">
          <button type="button" class="create-category-btn" (click)="openCategoryModal()">
            <svg class="plus-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Create Category
          </button>
        </div>
      }

      <div class="nav-right">
        <div class="nav-links">
          <a [routerLink]="dashboardLink()" routerLinkActive="active-link" class="nav-link">Dashboard</a>
          <a routerLink="/search" routerLinkActive="active-link" class="nav-link">Search</a>

          @if (authService.isAuthenticated()) {
            <div class="notification-wrapper">
              <button
                type="button"
                class="notification-btn"
                (click)="toggleNotificationPanel()"
                aria-label="Toggle notifications"
              >
                <svg class="bell-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                  <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                @if (notificationService.unreadCount() > 0) {
                  <span class="notification-badge">{{ notificationService.unreadCount() }}</span>
                }
              </button>
              <app-notification-panel
                [isOpen]="isNotificationPanelOpen()"
                (closePanel)="closeNotificationPanel()"
              />
            </div>

            <button type="button" class="logout-btn" (click)="onLogout()">Logout</button>
          }
        </div>
      </div>
    </div>
  </nav>
}

@if (showCategoryModal()) {
  <div class="modal-backdrop" (click)="closeCategoryModal()">
    <div class="modal-container" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>Create New Category</h3>
        <button class="modal-close-btn" (click)="closeCategoryModal()">×</button>
      </div>
      <div class="modal-body">
        <app-category-create
          (categoryCreated)="onCategoryCreated()"
          (cancelled)="closeCategoryModal()">
        </app-category-create>
      </div>
    </div>
  </div>
}
